services:
  # ── Backend: FastAPI Web Service ──────────────────────────────────────────
  - type: web
    name: qontint-backend
    env: docker
    repo: .
    rootDir: backend
    plan: starter
    region: ohio
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/qontint.db
      - key: GOOGLE_API_KEY
        sync: false
    disk:
      name: qontint-data
      mountPath: /app/data
      sizeGB: 1

# ── Frontend: React Static Site ───────────────────────────────────────────
staticSites:
  - name: qontint-frontend
    repo: .
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          name: qontint-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
